<ion-header>
  <ion-toolbar class="chat-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/matches"></ion-back-button>
    </ion-buttons>
    <ion-title>
      <ion-icon name="chatbubbles-outline"></ion-icon>
      {{ matchTitle }}
    </ion-title>
  </ion-toolbar>
</ion-header>
<ion-content [fullscreen]="true" class="chat-content">
  <div class="chat-pattern">
    <div class="bubble-glow"></div>
  </div>

  <div class="chat-container">
    <ion-card class="chat-card">
      <div class="card-top-accent"></div>

      <ion-card-header>
        <ion-card-title class="chat-card-title">
          <ion-icon name="chatbubbles-outline"></ion-icon>
          <span>Chat en Vivo</span>
          <div class="live-indicator">
            <span class="live-dot"></span>
            <span class="live-text">EN VIVO</span>
          </div>
        </ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <div *ngIf="loading && messages.length === 0" class="loading-messages">
          <ion-spinner name="crescent"></ion-spinner>
          <p>Cargando chat...</p>
        </div>
        <div
          #chatContent
          class="chat-messages"
          *ngIf="!loading || messages.length > 0"
        >
          <div *ngIf="messages.length === 0" class="empty-chat">
            <ion-icon name="chatbubble-outline"></ion-icon>
            <h3>Sin mensajes</h3>
            <p>Sé el primero en comentar este partido</p>
          </div>
          <div
            *ngFor="let message of messages"
            class="message-wrapper"
            [class.my-message]="isMyMessage(message)"
            [class.other-message]="!isMyMessage(message)"
          >
            <div class="message-bubble">
              <div class="message-header">
                <span class="message-username">{{ message.username }}</span>
                <span class="message-time">{{ message.time }}</span>
              </div>
              <div class="message-text">{{ message.text }}</div>
            </div>
          </div>
        </div>
        <div class="chat-input-area">
          <div class="input-wrapper">
            <ion-input
              [(ngModel)]="newMessage"
              placeholder="Escribe tu comentario..."
              [disabled]="sending"
              (keyup.enter)="sendMessage()"
              class="message-input"
            ></ion-input>
            <ion-button
              (click)="sendMessage()"
              [disabled]="!newMessage.trim() || sending"
              class="send-button"
              shape="round"
            >
              <ion-icon
                [name]="sending ? 'hourglass-outline' : 'send-outline'"
                slot="icon-only"
              ></ion-icon>
            </ion-button>
          </div>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
