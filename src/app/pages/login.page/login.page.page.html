<ion-content class="login-content">
  <div class="football-field-bg">
    <div class="field-lines">
      <div class="center-circle"></div>
      <div class="halfway-line"></div>
      <div class="penalty-area left"></div>
      <div class="penalty-area right"></div>
    </div>
    <div class="floating-balls">
      <div class="ball ball-1">⚽</div>
      <div class="ball ball-2">⚽</div>
      <div class="ball ball-3">⚽</div>
    </div>
  </div>

  <div class="login-container">
    <div class="header-section">
      <div class="logo-container">
        <div class="shield-wrapper">
          <div class="shield-bg"></div>
          <img
            src="https://api.dicebear.com/7.x/bottts/svg?seed=laliga-app&backgroundColor=b6e3f4,c0aede,d1d4f9"
            alt="LaLiga Bets"
            class="logo-avatar"
          />
          <div class="shine-effect"></div>
        </div>
      </div>
      <h1 class="app-title">
        <span class="title-la">LA</span>
        <span class="title-liga">LIGA</span>
        <span class="title-bets">BETS</span>
      </h1>
      <p class="app-subtitle">
        <ion-icon name="trophy"></ion-icon>
        Tu quiniela deportiva oficial
      </p>
    </div>
    <div class="form-card">
      <div class="card-header-accent"></div>
      <h2 class="form-title">
        <ion-icon name="log-in-outline"></ion-icon>
        Acceso al Estadio
      </h2>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <div class="input-group">
          <ion-item class="custom-input" lines="none">
            <ion-icon
              name="mail-outline"
              slot="start"
              class="input-icon"
            ></ion-icon>
            <ion-input
              type="email"
              formControlName="email"
              placeholder="Correo electrónico"
              class="input-field"
            >
            </ion-input>
          </ion-item>
        </div>

        <div class="input-group">
          <ion-item class="custom-input" lines="none">
            <ion-icon
              name="lock-closed-outline"
              slot="start"
              class="input-icon"
            ></ion-icon>
            <ion-input
              type="password"
              formControlName="password"
              placeholder="Contraseña"
              class="input-field"
            >
            </ion-input>
          </ion-item>
        </div>

        <div *ngIf="error" class="error-message">
          <ion-icon name="alert-circle-outline"></ion-icon>
          <span>{{ error }}</span>
        </div>

        <ion-button
          expand="block"
          type="submit"
          class="login-button"
          [disabled]="loginForm.invalid"
        >
          <ion-icon name="football-outline" slot="start"></ion-icon>
          <span>Entrar al Campo</span>
          <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
        </ion-button>
      </form>

      <div class="forgot-password">
        <ion-icon name="help-circle-outline"></ion-icon>
        <a href="#">¿Olvidaste tu contraseña?</a>
      </div>
    </div>
    <div class="footer-section">
      <div class="stats-banner">
        <div class="stat-item">
          <ion-icon name="people"></ion-icon>
          <span>+10K</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <ion-icon name="football"></ion-icon>
          <span>380</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <ion-icon name="trophy"></ion-icon>
          <span>Live</span>
        </div>
      </div>
      <p class="register-text">¿Primera vez en el estadio?</p>
      <ion-button routerLink="/register" fill="outline" class="register-button">
        <ion-icon name="person-add-outline" slot="start"></ion-icon>
        Únete Ahora
      </ion-button>
    </div>

    <!-- cositas que caen con la animacion de scss -->
    <div class="decoration-particle particle-1">⚽</div>
    <div class="decoration-particle particle-2">🏆</div>
    <div class="decoration-particle particle-3">⭐</div>
  </div>
</ion-content>
